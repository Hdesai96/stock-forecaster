apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-forecaster-frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: gcr.io/YOUR_PROJECT_ID/stock-forecaster-frontend:latest
          ports:
            - containerPort: 8501
          env:
            - name: PORT
              value: "8501"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: stock-forecaster-frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: LoadBalancer
